<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Olympus Multiplayer Engine</title>

<style>
html,body{margin:0;padding:0;overflow:hidden;background:#000;font-family:system-ui}
#ui{
  position:fixed;top:10px;left:10px;
  color:#fff;background:rgba(0,0,0,.6);
  padding:10px;border-radius:8px;font-size:12px;
}
button{margin-top:5px}
</style>
</head>

<body>

<div id="ui">
  <div id="status">Connecting...</div>
  <button id="create">Create Room</button>
  <button id="join">Join Room</button>
</div>

<canvas id="c"></canvas>

<!-- THREE -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDk6cG67wi5tRaFBMKRxfqVTzD37d00cvg",
  authDomain: "olympus-chess-hub.firebaseapp.com",
  projectId: "olympus-chess-hub",
  storageBucket: "olympus-chess-hub.firebasestorage.app",
  messagingSenderId: "554195593403",
  appId: "1:554195593403:web:e2c7a2e202ad21d076219e"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let uid = null;
let roomId = null;
let color = null;

/* anonymous login */
auth.signInAnonymously().then(u=>{
  uid = u.user.uid;
  document.getElementById("status").innerText = "Logged in: " + uid.slice(0,6);
});

/* ================= ENGINE ================= */
const canvas = document.getElementById("c");
const renderer = new THREE.WebGLRenderer({canvas});
renderer.setSize(innerWidth,innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111);

const camera = new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,100);
camera.position.set(4,8,10);

const controls = new THREE.OrbitControls(camera,renderer.domElement);
controls.target.set(4,0,4);
controls.update();

/* board */
const board = new THREE.Group();
const geo = new THREE.BoxGeometry(1,0.1,1);
const light = new THREE.MeshStandardMaterial({color:0xb58863});
const dark = new THREE.MeshStandardMaterial({color:0x6b4f3f});

for(let r=0;r<8;r++){
for(let c=0;c<8;c++){
const m=new THREE.Mesh(geo,(r+c)%2?dark:light);
m.position.set(c,0,r);
board.add(m);
}}
scene.add(board);

/* lighting */
scene.add(new THREE.HemisphereLight(0xffffff,0x222,1));

/* state */
let pieces = {};
let selected = null;

/* chess init */
function resetBoard(){
pieces = {};
for(let r=0;r<8;r++){
for(let c=0;c<8;c++){
const id = r+"-"+c;
pieces[id] = null;
}}}

/* SIMPLE PIECE */
function createPiece(color,x,z){
const g = new THREE.Mesh(
new THREE.CylinderGeometry(0.3,0.4,0.6,16),
new THREE.MeshStandardMaterial({color:color==="w"?0xffffff:0x222222})
);
g.position.set(x,0.3,z);
scene.add(g);
return g;
}

/* ================= FIREBASE ROOM ================= */

function createRoom(){
roomId = Math.random().toString(36).substring(2,7);

db.collection("rooms").doc(roomId).set({
board:{},
turn:"w",
created:Date.now()
});

listenRoom();

document.getElementById("status").innerText =
"Room created: " + roomId;
}

function joinRoom(){
roomId = prompt("Enter room ID:");
if(!roomId) return;

listenRoom();

document.getElementById("status").innerText =
"Joined room: " + roomId;
}

function listenRoom(){
db.collection("rooms").doc(roomId)
.onSnapshot(doc=>{
const data = doc.data();
if(!data) return;

renderFromState(data.board || {});
});
}

/* sync render */
function renderFromState(state){
Object.values(scene.children).forEach(o=>{
if(o.isMesh && o.userData.piece) scene.remove(o);
});

for(const k in state){
const p = state[k];
if(p){
const [r,c] = k.split("-").map(Number);
const mesh = createPiece(p,c,r);
mesh.userData.piece = true;
}
}
}

/* move */
function sendMove(from,to,color){
db.collection("rooms").doc(roomId).update({
[`board.${from}`]: null,
[`board.${to}`]: {color}
});
}

/* click */
window.addEventListener("click",e=>{
if(!roomId) return;

const x = Math.floor(Math.random()*8);
const y = Math.floor(Math.random()*8);

const from = x+"-"+y;
const to = (x+1)+"-"+y;

sendMove(from,to,"w");
});

/* buttons */
document.getElementById("create").onclick=createRoom;
document.getElementById("join").onclick=joinRoom;

/* loop */
function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}
animate();

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>
</body>
</html>
