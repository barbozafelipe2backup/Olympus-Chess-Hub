<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Olympus Chess Hub v12 NEXT</title>

<style>
body { margin:0; overflow:hidden; background:#000; font-family:system-ui; }
#ui{
  position:absolute; top:10px; left:10px;
  background:rgba(0,0,0,0.6);
  color:#fff; padding:10px;
  font-size:12px;
  border:1px solid #333;
  width:220px;
}
button{
  background:#111827; color:#fff;
  border:1px solid #444;
  padding:4px 6px;
  margin:2px;
  cursor:pointer;
}
button:hover{border-color:#ffd700;}
</style>
</head>

<body>

<div id="ui">
  <div><b>OLYMPUS HUB v12 NEXT</b></div>
  <div>MODE: <span id="mode">LIVE</span></div>
  <div>TICK: <span id="tick">0</span></div>

  <button onclick="setMode('LIVE')">LIVE</button>
  <button onclick="setMode('REPLAY')">REPLAY</button>
  <button onclick="reset()">RESET</button>

  <br/><br/>
  <input id="scrub" type="range" min="0" max="0" value="0"/>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>

/* =========================
   CORE CHESS ENGINE (REAL)
========================= */
class Chess {
  constructor(){ this.reset(); }

  reset(){
    this.board=[
      ["r","n","b","q","k","b","n","r"],
      ["p","p","p","p","p","p","p","p"],
      [".",".",".",".",".",".",".","."],
      [".",".",".",".",".",".",".","."],
      [".",".",".",".",".",".",".","."],
      [".",".",".",".",".",".",".","."],
      ["P","P","P","P","P","P","P","P"],
      ["R","N","B","Q","K","B","N","R"]
    ];
    this.turn="w";
    this.events=[];
  }

  clone(b){ return b.map(r=>r.slice()); }

  isWhite(p){ return p===p.toUpperCase(); }

  move(from,to){
    const [x1,y1]=from,[x2,y2]=to;
    const p=this.board[y1][x1];
    if(p===".") return false;

    const white=this.isWhite(p);
    if((this.turn==="w"&&!white)||(this.turn==="b"&&white)) return false;

    const target=this.board[y2][x2];
    if(target!=="." && this.isWhite(target)===white) return false;

    // VERY simplified legality (keep deterministic core clean)
    this.board[y1][x1]=".";
    this.board[y2][x2]=p;

    const event={
      piece:p,
      from,
      to,
      capture:target!=="." ? target : null
    };

    this.events.push(event);
    this.turn=this.turn==="w"?"b":"w";

    return event;
  }
}

/* =========================
   DIFF ENGINE (v8 STYLE)
========================= */
class DiffEngine{
  constructor(core){
    this.core=core;
    this.listeners=[];
    core._emit=this.emit.bind(this);
  }

  on(fn){ this.listeners.push(fn); }

  emit(e){
    const diff={
      piece:e.piece,
      from:e.from,
      to:e.to,
      capture:e.capture,
      animations:[
        {type:"move",from:e.from,to:e.to,p:e.piece}
      ]
    };

    if(e.capture){
      diff.animations.push({type:"remove",at:e.to,p:e.capture});
    }

    for(const fn of this.listeners) fn(diff);
  }
}

/* =========================
   DIRECTOR (v10 LIGHT)
========================= */
class Director{
  constructor(scene,camera){
    this.scene=scene;
    this.camera=camera;
  }

  play(diff){
    // simple cinematic hook
    this.camera.position.y=8;
  }
}

/* =========================
   THREE SETUP
========================= */
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x05070a);

const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000);
camera.position.set(6,8,10);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const controls=new THREE.OrbitControls(camera,renderer.domElement);

/* LIGHT */
scene.add(new THREE.AmbientLight(0xffffff,0.4));
const d=new THREE.DirectionalLight(0xffffff,1);
d.position.set(10,10,10);
scene.add(d);

/* BOARD */
const pieces=[];
const tiles=[];

for(let x=0;x<8;x++){
  for(let z=0;z<8;z++){
    const g=new THREE.BoxGeometry(1,0.2,1);
    const m=new THREE.MeshStandardMaterial({color:(x+z)%2?0x333:0x777});
    const t=new THREE.Mesh(g,m);
    t.position.set(x,0,z);
    scene.add(t);
    tiles.push(t);
  }
}

/* PIECES */
function spawn(p,x,z){
  const geo=new THREE.CylinderGeometry(0.3,0.3,0.6,16);
  const mat=new THREE.MeshStandardMaterial({color:p===p.toUpperCase()?0xffffff:0x111827});
  const m=new THREE.Mesh(geo,mat);
  m.position.set(x,0.4,z);
  m.userData={x,z,p};
  scene.add(m);
  pieces.push(m);
  return m;
}

const core=new Chess();
const diff=new DiffEngine(core);
const director=new Director(scene,camera);

/* INIT PIECES */
function rebuild(){
  pieces.forEach(p=>scene.remove(p));
  pieces.length=0;
  for(let y=0;y<8;y++){
    for(let x=0;x<8;x++){
      const p=core.board[y][x];
      if(p!=="." ) spawn(p,x,y);
    }
  }
}
rebuild();

/* STATE */
let mode="LIVE";
let tick=0;

/* DIFF HANDLER */
diff.on(d=>{
  director.play(d);

  d.animations.forEach(a=>{
    if(a.type==="move"){
      const obj=pieces.find(p=>p.userData.x===a.from[0]&&p.userData.z===a.from[1]);
      if(obj){
        obj.position.x=a.to[0];
        obj.position.z=a.to[1];
        obj.userData.x=a.to[0];
        obj.userData.z=a.to[1];
      }
    }
    if(a.type==="remove"){
      const obj=pieces.find(p=>p.userData.x===a.at[0]&&p.userData.z===a.at[1]);
      if(obj) scene.remove(obj);
    }
  });

  tick++;
  document.getElementById("tick").innerText=tick;
  document.getElementById("scrub").max=tick;
});

/* INPUT */
window.onclick=(e)=>{
  if(mode!=="LIVE") return;

  const x=Math.floor((e.clientX/innerWidth)*8);
  const z=Math.floor((e.clientY/innerHeight)*8);

  if(window.sel==null){
    window.sel=[x,z];
  }else{
    const ev=core.move(window.sel,[x,z]);
    if(ev) core._emit(ev);
    window.sel=null;
  }
};

/* UI */
window.setMode=(m)=>mode=m;
window.reset=()=>{
  core.reset();
  rebuild();
  tick=0;
};

function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
