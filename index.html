<!DOCTYPE html>
<html>
<head>
    <title>Olympus Chess 3D</title>
    <style>body { margin: 0; overflow: hidden; background: #000; }</style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Basic Board Rendering
        const board = new THREE.Mesh(new THREE.BoxGeometry(8, 0.5, 8), new THREE.MeshPhongMaterial({ color: 0x222222 }));
        scene.add(board);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        
        camera.position.set(0, 8, 10);
        camera.lookAt(0, 0, 0);

        // Handle Moves from Server
        socket.on('move', (data) => {
            console.log("Opponent moved:", data);
            // Logic to move 3D mesh objects on board
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
