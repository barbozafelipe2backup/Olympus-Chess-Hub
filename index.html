<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Olympus Hub v17 — Production Cinematic Engine</title>

<style>
body { margin:0; overflow:hidden; background:#000; font-family:system-ui; }

#ui{
  position:absolute;
  top:10px; left:10px;
  width:280px;
  padding:14px;
  background:rgba(0,0,0,0.85);
  color:#fff;
  border:1px solid #333;
  font-size:12px;
  z-index:10;
}

button{
  width:100%;
  margin-top:6px;
  padding:8px;
  background:#111;
  border:1px solid #444;
  color:#fff;
  cursor:pointer;
}
button:hover{ border-color:#ffd700; }
</style>
</head>

<body>

<div id="ui">
  <b>OLYMPUS HUB v17 — PRODUCTION</b><br/>
  MODE: <span id="mode">LIVE</span><br/>
  STATE: <span id="state">IDLE</span>

  <button onclick="setMode('LIVE')">LIVE</button>
  <button onclick="setMode('REPLAY')">REPLAY</button>
  <button onclick="triggerMove()">EXECUTE MOVE</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

<script>

/* =========================
   CORE (DETERMINISTIC DELTA)
========================= */
class Core {
  constructor() {
    this.turn = 0;
  }

  move() {
    // deterministic pseudo move (replace later with real rules engine)
    const delta = {
      id: "m" + (++this.turn),
      from: [Math.floor(Math.random()*8), Math.floor(Math.random()*8)],
      to: [Math.floor(Math.random()*8), Math.floor(Math.random()*8)],
      capture: Math.random() > 0.6
    };
    return delta;
  }
}

/* =========================
   SHOT SYSTEM (CINEMATIC RULES)
========================= */
class ShotSystem {
  static build(delta) {

    if (delta.capture) {
      return {
        mode: "IMPACT",
        duration: 900,
        cam: new THREE.Vector3(6, 9, 6),
        look: new THREE.Vector3(3.5, 0, 3.5)
      };
    }

    return {
      mode: "TENSION",
      duration: 750,
      cam: new THREE.Vector3(3.5, 10, 10),
      look: new THREE.Vector3(3.5, 0, 3.5)
    };
  }
}

/* =========================
   DIRECTOR (CAMERA AUTHORITY)
========================= */
class Director {
  constructor(camera, controls) {
    this.camera = camera;
    this.controls = controls;
    this.locked = false;
  }

  play(delta) {
    if (this.locked) return;

    const shot = ShotSystem.build(delta);

    this.locked = true;
    this.controls.enabled = false;

    document.getElementById("state").innerText = shot.mode;

    new TWEEN.Tween(this.camera.position)
      .to(shot.cam, shot.duration)
      .easing(TWEEN.Easing.Cubic.InOut)
      .onUpdate(() => this.camera.lookAt(shot.look))
      .onComplete(() => {
        this.locked = false;
        this.controls.enabled = true;
        document.getElementById("state").innerText = "IDLE";
      })
      .start();
  }
}

/* =========================
   SCENE SETUP
========================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05070a);

const camera = new THREE.PerspectiveCamera(
  60, innerWidth/innerHeight, 0.1, 1000
);

camera.position.set(6, 8, 10);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(3.5, 0, 3.5);

/* LIGHT */
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,10,10);
scene.add(light);

/* BOARD */
const tiles = [];

for (let x=0; x<8; x++){
  for (let z=0; z<8; z++){
    const tile = new THREE.Mesh(
      new THREE.BoxGeometry(1,0.2,1),
      new THREE.MeshStandardMaterial({
        color: (x+z)%2 ? 0x333333 : 0x777777
      })
    );
    tile.position.set(x,0,z);
    scene.add(tile);
    tiles.push(tile);
  }
}

/* =========================
   INPUT (TILE RAYCAST)
========================= */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selected = null;

function getTile(e){
  mouse.x = (e.clientX / innerWidth)*2 - 1;
  mouse.y = -(e.clientY / innerHeight)*2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hit = raycaster.intersectObjects(tiles)[0];
  if(!hit) return null;

  const p = hit.object.position;
  return [Math.round(p.x), Math.round(p.z)];
}

window.addEventListener("click", (e) => {
  if (mode !== "LIVE") return;

  const pos = getTile(e);
  if (!pos) return;

  if (!selected) {
    selected = pos;
    return;
  }

  const delta = core.move(selected, pos);
  selected = null;

  director.play(delta);
});

/* =========================
   EXECUTION
========================= */
const core = new Core();
const director = new Director(camera, controls);

let mode = "LIVE";

window.setMode = (m) => {
  mode = m;
  document.getElementById("mode").innerText = m;
};

window.triggerMove = () => {
  const delta = core.move();
  director.play(delta);
};

function animate(t){
  requestAnimationFrame(animate);
  TWEEN.update(t);
  controls.update();
  renderer.render(scene, camera);
}

animate();

</script>

</body>
</html>
