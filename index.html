<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Olympus Hub v17.1 — Safe Boot Engine</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  width: 100%;
  height: 100%;
  background: #000;
  font-family: system-ui;
}

canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(0,0,0,0.85);
  color: white;
  padding: 12px;
  width: 260px;
  border: 1px solid #444;
  font-size: 12px;
  z-index: 10;
}
</style>
</head>

<body>

<div id="ui">
  <b>OLYMPUS v17.1 SAFE</b><br/>
  STATE: <span id="state">BOOTING</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

<script>

let scene, camera, renderer, controls;

const CENTER = new THREE.Vector3(3.5, 0, 3.5);

/* =========================
   SAFE INIT SYSTEM
========================= */
function init() {

  // Scene
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x05070a);

  // Camera
  camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );

  camera.position.set(3.5, 8, 10);

  // Renderer (CRITICAL: attach early)
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  document.body.appendChild(renderer.domElement);

  // Controls (AFTER renderer exists)
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.target.copy(CENTER);
  controls.update();

  camera.lookAt(CENTER);

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(10, 10, 10);
  scene.add(light);

  // Board
  buildBoard();

  // Resize safety
  window.addEventListener("resize", resize);
  resize();

  document.getElementById("state").innerText = "READY";

  animate();
}

/* =========================
   BOARD
========================= */
function buildBoard() {
  for (let x = 0; x < 8; x++) {
    for (let z = 0; z < 8; z++) {

      const tile = new THREE.Mesh(
        new THREE.BoxGeometry(1, 0.2, 1),
        new THREE.MeshStandardMaterial({
          color: (x + z) % 2 ? 0x333333 : 0x777777
        })
      );

      tile.position.set(x, 0, z);
      scene.add(tile);
    }
  }

  const piece = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3, 0.3, 0.6, 16),
    new THREE.MeshStandardMaterial({ color: 0xffffff })
  );

  piece.position.set(2, 0.4, 2);
  scene.add(piece);
}

/* =========================
   RESIZE FIX (CRITICAL)
========================= */
function resize() {
  const w = window.innerWidth || document.documentElement.clientWidth;
  const h = window.innerHeight || document.documentElement.clientHeight;

  if (!camera || !renderer) return;

  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h, false);
}

/* =========================
   LOOP
========================= */
function animate(t) {
  requestAnimationFrame(animate);

  if (controls) controls.update();
  if (renderer && scene && camera) {
    renderer.render(scene, camera);
  }

  TWEEN.update(t);
}

/* BOOT SEQUENCE (CRITICAL FIX) */
window.addEventListener("load", () => {
  init();
});

</script>

</body>
</html>
