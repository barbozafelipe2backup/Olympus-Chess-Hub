<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Olympus Chess Hub v22 — Hybrid Core</title>

<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  font-family:system-ui;
  overflow:hidden;
  background: radial-gradient(circle at top, #0a1a3a, #000);
  color:white;
}

.background{
  position:absolute;
  width:100%;
  height:100%;
  background:url("https://images.unsplash.com/photo-1529699211952-734e80c4d42b?auto=format&fit=crop&w=1600&q=80");
  background-size:cover;
  opacity:0.25;
  filter:blur(2px);
}

.center{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:360px;
  background:rgba(0,0,40,0.75);
  border:1px solid rgba(255,255,255,0.15);
  padding:20px;
  backdrop-filter: blur(10px);
}

h1{text-align:center;font-weight:300;letter-spacing:2px;}

input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

button{
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  background:#1a73ff;
  color:white;
  cursor:pointer;
}

button:hover{background:#4aa3ff;}

.small{
  font-size:11px;
  opacity:0.7;
  text-align:center;
  margin-top:8px;
  cursor:pointer;
}

.screen{display:none;}
.active{display:block;}

.email-card{
  background:rgba(0,0,60,0.9);
  border:1px solid rgba(255,255,255,0.2);
  padding:20px;
  margin-top:10px;
  font-size:12px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="background"></div>

<div class="center">

<!-- LOGIN -->
<div id="loginScreen" class="screen active">
  <h1>OLYMPUS CHESS</h1>
  <input id="email" placeholder="Email"/>
  <input id="password" type="password" placeholder="Password"/>
  <button onclick="login()">LOGIN</button>
  <div class="small" onclick="switchScreen('registerScreen')">Create Account</div>
  <div class="small" onclick="switchScreen('resetScreen')">Forgot Password</div>
</div>

<!-- REGISTER -->
<div id="registerScreen" class="screen">
  <h1>CREATE ACCOUNT</h1>
  <input id="name" placeholder="Name"/>
  <input id="regEmail" placeholder="Email"/>
  <input id="regPass" type="password" placeholder="Password"/>
  <button onclick="register()">CREATE</button>
  <div class="small" onclick="switchScreen('loginScreen')">Back</div>
</div>

<!-- RESET -->
<div id="resetScreen" class="screen">
  <h1>RESET PASSWORD</h1>
  <input id="resetEmail" placeholder="Email"/>
  <button onclick="resetPassword()">SEND</button>
  <div class="small" onclick="switchScreen('loginScreen')">Back</div>
</div>

<!-- WELCOME -->
<div id="welcomeScreen" class="screen">
  <h1>WELCOME</h1>
  <div id="emailBox" class="email-card"></div>
  <button onclick="switchScreen('loginScreen')">BACK</button>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
/* ---------------- FIREBASE INIT ---------------- */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* ---------------- UI ---------------- */
function $(id){ return document.getElementById(id); }

function switchScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  $(id).classList.add("active");
}

function showEmail(text){
  $("emailBox").innerText = text;
}

/* ---------------- AUTH ---------------- */

async function register(){
  const name = $("name").value;
  const email = $("regEmail").value;
  const pass = $("regPass").value;

  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);

    await db.collection("users").doc(cred.user.uid).set({
      name,
      email,
      created: Date.now()
    });

    showEmail(
`Welcome ${name},

Your Olympus Chess Hub account is active.

Email: ${email}

— Olympus System`
    );

    switchScreen("welcomeScreen");

    // OPTIONAL EMAILJS HOOK (if enabled)
    sendEmail(name, email);

  } catch(e){
    alert(e.message);
  }
}

async function login(){
  const email = $("email").value;
  const pass = $("password").value;

  try {
    const cred = await auth.signInWithEmailAndPassword(email, pass);

    const doc = await db.collection("users").doc(cred.user.uid).get();

    showEmail(
`Welcome back ${doc.data().name},

System Status: ACTIVE
Authentication: VERIFIED

— Olympus Core`
    );

    switchScreen("welcomeScreen");

  } catch(e){
    alert("Login failed");
  }
}

async function resetPassword(){
  const email = $("resetEmail").value;

  try {
    await auth.sendPasswordResetEmail(email);
    alert("Reset email sent");
  } catch(e){
    alert(e.message);
  }
}

/* ---------------- OPTIONAL EMAILJS ---------------- */
function sendEmail(name, email){
  // requires EmailJS setup
  // emailjs.send(SERVICE, TEMPLATE, {name, email});
  console.log("Email trigger:", name, email);
}
</script>

</body>
</html>
