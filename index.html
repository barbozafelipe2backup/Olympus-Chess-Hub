<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Olympus Chess — Simple 3D Board</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;
    background: #000;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<script>
(() => {
  const canvas = document.getElementById("c");

  const renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: true,
    powerPreference: "high-performance"
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight, false);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050608);

  const camera = new THREE.PerspectiveCamera(
    55,
    window.innerWidth / window.innerHeight,
    0.1,
    100
  );
  camera.position.set(6, 10, 12);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.target.set(3.5, 0, 3.5);
  controls.update();
  camera.lookAt(3.5, 0, 3.5);

  // Lights
  const hemi = new THREE.HemisphereLight(0xffffff, 0x222233, 0.9);
  scene.add(hemi);

  const dir = new THREE.DirectionalLight(0xffffff, 1.2);
  dir.position.set(10, 15, 8);
  scene.add(dir);

  // Board base
  const boardBase = new THREE.Mesh(
    new THREE.BoxGeometry(9, 0.4, 9),
    new THREE.MeshStandardMaterial({ color: 0x1b1e24 })
  );
  boardBase.position.set(3.5, -0.25, 3.5);
  scene.add(boardBase);

  // Tiles
  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 8; c++) {
      const tile = new THREE.Mesh(
        new THREE.BoxGeometry(1, 0.1, 1),
        new THREE.MeshStandardMaterial({
          color: (r + c) % 2 ? 0x3b2f2f : 0xc2a37a
        })
      );
      tile.position.set(c, 0, r);
      scene.add(tile);
    }
  }

  // One test piece in the center
  const piece = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3, 0.3, 0.8, 24),
    new THREE.MeshStandardMaterial({ color: 0xf5f5f5 })
  );
  piece.position.set(3.5, 0.5, 3.5);
  scene.add(piece);

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight, false);
  });
})();
</script>
</body>
</html>
