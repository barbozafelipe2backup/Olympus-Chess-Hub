<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Olympus Hub v17 — Locked Production Build</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  width: 100%;
  height: 100%;
  background: #000;
  font-family: system-ui;
}

canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  background: rgba(0,0,0,0.88);
  color: #fff;
  padding: 12px;
  width: 260px;
  border: 1px solid #444;
  font-size: 12px;
  z-index: 10;
}

button {
  width: 100%;
  margin-top: 6px;
  padding: 8px;
  background: #111;
  border: 1px solid #444;
  color: white;
}
button:hover { border-color: gold; }
</style>
</head>

<body>

<div id="ui">
  <b>OLYMPUS HUB v17 — LOCKED</b><br/>
  MODE: <span id="mode">LIVE</span><br/>
  STATE: <span id="state">IDLE</span>

  <button onclick="setMode('LIVE')">LIVE</button>
  <button onclick="setMode('REPLAY')">REPLAY</button>
  <button onclick="triggerMove()">EXECUTE MOVE</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

<script>

/* =========================
   CORE (deterministic delta)
========================= */
class Core {
  move() {
    return {
      from: [2,2],
      to: [5,5],
      capture: Math.random() > 0.5
    };
  }
}

/* =========================
   DIRECTOR (camera authority)
========================= */
class Director {
  constructor(camera, controls) {
    this.camera = camera;
    this.controls = controls;
    this.locked = false;

    this.lookTarget = new THREE.Vector3(3.5, 0, 3.5);
  }

  play(delta) {
    if (this.locked) return;
    this.locked = true;

    this.controls.enabled = false;

    const impact = delta.capture;

    const targetPos = impact
      ? new THREE.Vector3(6, 9, 6)
      : new THREE.Vector3(3.5, 10, 10);

    const duration = impact ? 950 : 850;

    new TWEEN.Tween(this.camera.position)
      .to(targetPos, duration)
      .easing(impact ? TWEEN.Easing.Cubic.InOut : TWEEN.Easing.Quadratic.InOut)
      .onUpdate(() => {
        this.camera.lookAt(this.lookTarget);
      })
      .onComplete(() => {
        this.locked = false;
        this.controls.enabled = true;
        document.getElementById("state").innerText = "IDLE";
      })
      .start();
  }
}

/* =========================
   SCENE SETUP (CENTERED FIX)
========================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05070a);

const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

/* ✅ HARD FIX: true board center framing */
const BOARD_CENTER = new THREE.Vector3(3.5, 0, 3.5);
camera.position.set(3.5, 8, 10);
camera.lookAt(BOARD_CENTER);

const renderer = new THREE.WebGLRenderer({
  antialias: true,
  powerPreference: "high-performance"
});

renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

/* controls */
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.copy(BOARD_CENTER);
controls.update();

/* lights */
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 10, 10);
scene.add(light);

/* =========================
   BOARD (CENTER-LOCKED)
========================= */
const tiles = [];

for (let x = 0; x < 8; x++) {
  for (let z = 0; z < 8; z++) {

    const tile = new THREE.Mesh(
      new THREE.BoxGeometry(1, 0.2, 1),
      new THREE.MeshStandardMaterial({
        color: (x + z) % 2 ? 0x333333 : 0x777777
      })
    );

    tile.position.set(x, 0, z);
    scene.add(tile);
    tiles.push(tile);
  }
}

/* =========================
   ENTITIES
========================= */
class Entity {
  constructor(mesh, x, z) {
    this.mesh = mesh;
    this.x = x;
    this.z = z;
    this.tx = x;
    this.tz = z;
  }

  setTarget(x, z) {
    this.tx = x;
    this.tz = z;
  }

  update() {
    this.mesh.position.x += (this.tx - this.mesh.position.x) * 0.18;
    this.mesh.position.z += (this.tz - this.mesh.position.z) * 0.18;
  }
}

const world = { entities: [] };

function spawnPiece(x, z) {
  const mesh = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3, 0.3, 0.6, 16),
    new THREE.MeshStandardMaterial({ color: 0xffffff })
  );

  mesh.position.set(x, 0.4, z);
  scene.add(mesh);

  const e = new Entity(mesh, x, z);
  world.entities.push(e);
  return e;
}

/* initial piece */
spawnPiece(2,2);

/* =========================
   SYSTEMS
========================= */
const core = new Core();
const director = new Director(camera, controls);

/* reuse (IMPORTANT FIX) */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

let selected = null;

/* =========================
   INPUT (stable + single raycaster)
========================= */
window.addEventListener("click", (e) => {

  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const hit = raycaster.intersectObjects(tiles);
  if (!hit.length) return;

  const x = Math.round(hit[0].object.position.x);
  const z = Math.round(hit[0].object.position.z);

  if (!selected) {
    selected = [x, z];
    return;
  }

  const delta = core.move();
  director.play(delta);

  document.getElementById("state").innerText =
    delta.capture ? "IMPACT" : "TENSION";

  selected = null;
});

/* =========================
   UI
========================= */
window.setMode = (m) => {
  document.getElementById("mode").innerText = m;
};

window.triggerMove = () => {
  const delta = core.move();
  director.play(delta);

  document.getElementById("state").innerText =
    delta.capture ? "IMPACT" : "TENSION";
};

/* =========================
   RESIZE (FIXED FRUSTUM)
========================= */
function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight;

  camera.aspect = w / h;
  camera.updateProjectionMatrix();

  renderer.setSize(w, h, false);
}

window.addEventListener("resize", resize);
resize();

/* =========================
   LOOP
========================= */
function animate(time) {
  requestAnimationFrame(animate);

  for (const e of world.entities) {
    e.update();
  }

  TWEEN.update(time);
  controls.update();
  renderer.render(scene, camera);
}

animate();

</script>
</body>
</html>
