<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Olympus Chess Prototype</title>

<style>
html,body{
  margin:0;
  height:100%;
  background:#050608;
  color:#fff;
  font-family:system-ui;
  overflow:hidden;
}
.screen{
  position:absolute;
  inset:0;
  display:none;
}
.screen.active{display:flex;}

#menu{
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:18px;
  background:radial-gradient(circle at top,#10244d,#050608 70%);
}
#menu h1{
  font-size:56px;
  margin:0;
  letter-spacing:4px;
}
.btn{
  width:260px;
  padding:16px;
  border-radius:14px;
  border:1px solid #3a4d7a;
  background:#11224a;
  color:#fff;
  font-size:18px;
  cursor:pointer;
}

#game{
  flex-direction:row;
}
#leftPanel{
  width:260px;
  background:#0b0f17;
  padding:12px;
  box-sizing:border-box;
  overflow:auto;
}
#boardWrap{
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}
#board{
  width:min(88vmin,760px);
  height:min(88vmin,760px);
  display:grid;
  grid-template-columns:repeat(8,1fr);
  border:4px solid #333;
}
.square{
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(28px,5vmin,52px);
  user-select:none;
}
.light{background:#c2a37a;}
.dark{background:#3b2f2f;}
.selected{outline:4px solid #00aaff;}
.move{box-shadow:inset 0 0 0 4px #00ff99;}

.panelTitle{
  font-weight:bold;
  margin:10px 0 6px;
}
.moveList{
  max-height:240px;
  overflow:auto;
  font-size:14px;
  line-height:1.5;
}
.clock{
  background:#121826;
  padding:10px;
  border-radius:10px;
  margin:8px 0;
  font-size:28px;
  text-align:center;
}
.captured{
  min-height:40px;
  font-size:24px;
  line-height:1.6;
  word-wrap:break-word;
}
.back{
  margin-top:10px;
  width:100%;
}

#olympus,#settings{
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
  background:linear-gradient(180deg,#0b1020,#050608);
}
.card{
  width:min(92vw,560px);
  background:#0f1526;
  border:1px solid #26324d;
  border-radius:18px;
  padding:20px;
  box-sizing:border-box;
}
.gods{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:14px;
}
.god{
  background:#111827;
  border:1px solid #2a395a;
  border-radius:14px;
  padding:16px;
  text-align:center;
}
.settingRow{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:12px 0;
}
select{
  background:#0b1220;
  color:#fff;
  border:1px solid #2a395a;
  border-radius:8px;
  padding:8px;
}
</style>
</head>
<body>

<!-- MAIN MENU -->
<div id="menu" class="screen active">
  <h1>OLYMPUS</h1>
  <button class="btn" onclick="show('game')">Start Game</button>
  <button class="btn" onclick="alert('Multiplayer comes in Option B')">Multiplayer</button>
  <button class="btn" onclick="show('olympus')">Olympus Mode</button>
  <button class="btn" onclick="show('settings')">Settings</button>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div id="leftPanel">
    <div class="panelTitle">Turn</div>
    <div id="turnText">White</div>

    <div class="panelTitle">White</div>
    <div id="whiteClock" class="clock">05:00</div>

    <div class="panelTitle">Black</div>
    <div id="blackClock" class="clock">05:00</div>

    <div class="panelTitle">Captured White</div>
    <div id="capWhite" class="captured"></div>

    <div class="panelTitle">Captured Black</div>
    <div id="capBlack" class="captured"></div>

    <div class="panelTitle">Moves</div>
    <div id="moveList" class="moveList"></div>

    <button class="btn back" onclick="show('menu')">Exit</button>
  </div>

  <div id="boardWrap">
    <div id="board"></div>
  </div>
</div>

<!-- OLYMPUS MODE -->
<div id="olympus" class="screen">
  <div class="card">
    <h2>Olympus Mode</h2>
    <p>Select a god for your match.</p>
    <div class="gods">
      <div class="god">
        <div style="font-size:42px">⚡</div>
        <div><b>Zeus</b></div>
        <div style="font-size:13px;color:#b9c2d0">Lightning strike</div>
      </div>
      <div class="god">
        <div style="font-size:42px">🌊</div>
        <div><b>Poseidon</b></div>
        <div style="font-size:13px;color:#b9c2d0">Tidal force</div>
      </div>
      <div class="god">
        <div style="font-size:42px">💀</div>
        <div><b>Hades</b></div>
        <div style="font-size:13px;color:#b9c2d0">Shadow realm</div>
      </div>
    </div>
    <button class="btn back" onclick="show('menu')">Back</button>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings" class="screen">
  <div class="card">
    <h2>Settings</h2>

    <div class="settingRow">
      <span>Board Theme</span>
      <select id="themeSelect" onchange="applyTheme()">
        <option value="classic">Classic</option>
        <option value="dark">Dark</option>
        <option value="neon">Neon</option>
      </select>
    </div>

    <div class="settingRow">
      <span>Sound</span>
      <span>On</span>
    </div>

    <div class="settingRow">
      <span>Animations</span>
      <span>On</span>
    </div>

    <button class="btn back" onclick="show('menu')">Back</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/1.0.0/chess.min.js"></script>
<script>
const screens=document.querySelectorAll('.screen');
function show(id){
  screens.forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

const boardEl=document.getElementById('board');
const moveListEl=document.getElementById('moveList');
const turnText=document.getElementById('turnText');
const capWhite=document.getElementById('capWhite');
const capBlack=document.getElementById('capBlack');

const chess=new Chess();
let selected=null;

const pieces={
  wp:'♙',wr:'♖',wn:'♘',wb:'♗',wq:'♕',wk:'♔',
  bp:'♟',br:'♜',bn:'♞',bb:'♝',bq:'♛',bk:'♚'
};

function squareName(r,c){
  return String.fromCharCode(97+c)+(8-r);
}

function renderBoard(){
  boardEl.innerHTML='';

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      const sq=squareName(r,c);
      const piece=chess.get(sq);

      const d=document.createElement('div');
      d.className='square '+((r+c)%2?'dark':'light');
      d.dataset.sq=sq;

      if(selected===sq) d.classList.add('selected');

      const moves=selected
        ? chess.moves({square:selected,verbose:true}).map(m=>m.to)
        : [];

      if(moves.includes(sq)) d.classList.add('move');

      if(piece){
        d.textContent=pieces[piece.color+piece.type];
      }

      d.onclick=()=>clickSquare(sq);

      boardEl.appendChild(d);
    }
  }

  turnText.textContent=chess.turn()==='w'?'White':'Black';
  updateMoves();
}

function clickSquare(sq){
  const piece=chess.get(sq);

  if(!selected){
    if(piece && piece.color===chess.turn()){
      selected=sq;
      renderBoard();
    }
    return;
  }

  if(selected===sq){
    selected=null;
    renderBoard();
    return;
  }

  const move=chess.move({
    from:selected,
    to:sq,
    promotion:'q'
  });

  if(move){
    selected=null;
    renderBoard();
    updateCaptured();
  }else{
    if(piece && piece.color===chess.turn()){
      selected=sq;
    }else{
      selected=null;
    }
    renderBoard();
  }
}

function updateMoves(){
  const hist=chess.history();
  let html='';

  for(let i=0;i<hist.length;i+=2){
    const w=hist[i]||'';
    const b=hist[i+1]||'';
    html+=`<div>${i/2+1}. ${w} ${b}</div>`;
  }

  moveListEl.innerHTML=html;
  moveListEl.scrollTop=moveListEl.scrollHeight;
}

function updateCaptured(){
  const start={
    p:8,r:2,n:2,b:2,q:1,k:1
  };

  const current={
    w:{p:0,r:0,n:0,b:0,q:0,k:0},
    b:{p:0,r:0,n:0,b:0,q:0,k:0}
  };

  chess.board().flat().forEach(p=>{
    if(p) current[p.color][p.type]++;
  });

  let whiteCaps='';
  let blackCaps='';

  for(const t in start){
    const missingBlack=start[t]-current.b[t];
    const missingWhite=start[t]-current.w[t];

    for(let i=0;i<missingBlack;i++){
      whiteCaps+=pieces['b'+t]+' ';
    }
    for(let i=0;i<missingWhite;i++){
      blackCaps+=pieces['w'+t]+' ';
    }
  }

  capWhite.textContent=whiteCaps;
  capBlack.textContent=blackCaps;
}

/* CLOCKS */
let whiteTime=300;
let blackTime=300;

function fmt(t){
  const m=Math.floor(t/60);
  const s=t%60;
  return String(m).padStart(2,'0')+':' + String(s).padStart(2,'0');
}

function tick(){
  if(document.getElementById('game').classList.contains('active')){
    if(chess.turn()==='w'){
      whiteTime=Math.max(0,whiteTime-1);
    }else{
      blackTime=Math.max(0,blackTime-1);
    }

    document.getElementById('whiteClock').textContent=fmt(whiteTime);
    document.getElementById('blackClock').textContent=fmt(blackTime);
  }
}
setInterval(tick,1000);

/* THEMES */
function applyTheme(){
  const t=document.getElementById('themeSelect').value;

  document.querySelectorAll('.light').forEach(s=>{
    s.style.background=
      t==='classic' ? '#c2a37a' :
      t==='dark'    ? '#6b6b6b' :
                      '#0b2b3a';
  });

  document.querySelectorAll('.dark').forEach(s=>{
    s.style.background=
      t==='classic' ? '#3b2f2f' :
      t==='dark'    ? '#2b2b2b' :
                      '#04151d';
  });
}

renderBoard();
</script>
</body>
</html>
